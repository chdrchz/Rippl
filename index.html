<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rippl</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .landing {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, rgb(0, 119, 182), rgb(66, 148, 190) 17%, rgb(255, 232, 214));
            width: 100%;
            gap: 25px;
        }

        .top-half {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 50px;
            gap: 30px;
        }

        .title {
            font-size: 50px;
            font-weight: bold;
            color: #094D92;
        }

        .title .period {
            color: #0077B6;
        }

        .subtitle-top {
            font-size: 20px;
            color: #094D92;
            font-weight: bold;
            margin: 0 25px;
            text-align: center;
        }

        .svg-container {
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            border-bottom: 2px solid black;
            position: relative;
        }

        .svg-placeholder {
            background: #ccc;
            width: 100px;
            height: 100px;
            margin: 10px;
            border-radius: 10px;
        }

        .bottom-half {
            flex: 1;
            width: 100%;
            background: linear-gradient(to bottom, rgb(255, 232, 214), rgb(214, 213, 195) 90%, rgb(124, 170, 152));
            display: flex;
            justify-content: center;
            position: relative;
            align-items: center;
            border-top-right-radius: 50px;
            border-top-left-radius: 50px;
            overflow: hidden;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            text-align: center;
            align-items: center;
            position: relative;
            gap: 30px;
            z-index: 2;
        }

        .subtitle-bottom {
            font-size: 20px;
            color: #3E594E;
            font-weight: bold;
            margin: 0 25px;
            text-align: center;
        }

        .button {
            width: 250px;
            height: 50px;
            border-radius: 25px;
            border: 2px solid #56766A;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 4px 4px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
        }

        .button:hover {
            transform: translateY(-2px);
        }

        .button-one {
            background-color: #FFE8D6;
            color: #56766A;
        }

        .button-two {
            background-color: #56766A;
            color: #FFE8D6;
        }

        .leaf-mound {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            background: #7CAA98;
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <div class="landing">
        <div class="top-half">
            <h1 class="title">Rippl<span class="period">.</span></h1>
            <p class="subtitle-top">Where small connections make big waves.</p>
            <div class="svg-container">
                <div class="svg-placeholder"></div>
                <div class="svg-placeholder"></div>
                <div class="svg-placeholder"></div>
                <div class="svg-placeholder"></div>
            </div>
        </div>
        <div class="bottom-half">
            <div class="button-container">
                <p class="subtitle-bottom">Create an account to join our waitlist.</p>
                <a href="/profile" class="button button-one">Sign Up</a>
                <a href="/updates" class="button button-two">Updates</a>
                <p class="subtitle-bottom">Not sure? Learn more about us here.</p>
            </div>
            <div class="leaf-mound"></div>
        </div>
    </div>
</body>
</html>
